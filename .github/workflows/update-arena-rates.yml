name: Sync HSReplay Arena rates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync-arena-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch the public HSReplay Arena page
        shell: python
        run: |
          import datetime
          import html
          import json
          import re
          import urllib.request

          url = "https://hsreplay.net/arena/"
          request = urllib.request.Request(
              url,
              headers={
                  "User-Agent": "Mozilla/5.0 (compatible; arnea-data-sync/1.0)",
                  "Accept": "text/html,application/xhtml+xml",
              },
          )
          raw = urllib.request.urlopen(request, timeout=60).read().decode("utf-8", "replace")
          text = html.unescape(re.sub(r"<[^>]+>", " ", raw))
          pattern = re.compile(
              r"#(\d+)\s+([A-Za-z]+(?:\s+[A-Za-z]+)?|[\u4e00-\u9fff·]+)\s+(\d+(?:\.\d+)?)%"
          )
          chinese_names = {
              "圣骑士": "Paladin",
              "猎人": "Hunter",
              "法师": "Mage",
              "牧师": "Priest",
              "死亡骑士": "Death Knight",
              "恶魔猎手": "Demon Hunter",
              "萨满祭司": "Shaman",
              "术士": "Warlock",
              "潜行者": "Rogue",
              "德鲁伊": "Druid",
              "战士": "Warrior",
          }
          rates = []
          seen = set()
          for rank, raw_name, win_rate in pattern.findall(text):
              english_name = raw_name if raw_name in set(chinese_names.values()) else chinese_names.get(raw_name)
              if not english_name or english_name in seen:
                  continue
              seen.add(english_name)
              rates.append({
                  "rank": int(rank),
                  "englishName": english_name,
                  "winRate": float(win_rate),
              })
          rates.sort(key=lambda item: item["rank"])
          if len(rates) < 9:
              raise RuntimeError("HSReplay class data was not found")
          payload = {
              "source": url,
              "updatedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "rates": rates,
          }
          with open("arena-rates.json", "w", encoding="utf-8") as output:
              json.dump(payload, output, ensure_ascii=False, indent=2)
              output.write("\n")

      - name: Commit updated rates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arena-rates.json
          if git diff --cached --quiet; then
            echo "No rate changes."
          else
            git commit -m "Update HSReplay Arena rates"
            git push
          fi
